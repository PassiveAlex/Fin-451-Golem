name: Update EIA Fundamentals Data

on:
  schedule:
    # 02:00 UTC daily = ~10pm ET (after EIA's Wednesday release window)
    - cron: '0 2 * * *'
  workflow_dispatch:
    # Allow manual runs from the GitHub Actions UI

jobs:
  update-data:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # needed to push the updated feather file

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: '4.3'
          use-public-rspm: true

      - name: Install R dependencies
        run: |
          install.packages(
            c("dplyr", "tidyr", "purrr", "tibble", "lubridate", "arrow", "RTL"),
            repos = "https://cloud.r-project.org"
          )
        shell: Rscript {0}

      - name: Fetch EIA data
        env:
          EIA_API_KEY: ${{ secrets.EIA_API_KEY }}
        run: Rscript dev/fetch_eia_data.R

      - name: Commit and push updated data
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add inst/extdata/eia_fundamentals.feather \
                  inst/extdata/eia_fundamentals_last_updated.txt
          # Only commit if files actually changed
          git diff --staged --quiet || \
            git commit -m "chore: update EIA fundamentals data [skip ci]"
          git pull --rebase origin main
          git push
